name: Conciliar Catalogo MercadoLibre
on:
  schedule:
    # Lunes a Sábado a las 6:00 PM local (Martes a Domingo a las 00:00 UTC)
    - cron: '0 0 * * 0,2-6'
  workflow_dispatch: # Botón manual en GitHub

jobs:
  run-conciliation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar Dependencias
        run: pip install -r requirements.txt
        
      - name: Ejecutar Conciliador
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python conciliador_publicaciones.py
